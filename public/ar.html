<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR 크로마키 뷰어</title>
    <meta property="og:title" content="AR 포토존">
    <meta property="og:description" content="카메라로 AR 크로마키 효과를 체험해보세요.">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="/css/ar-viewer.css">
</head>
<body>
    <!-- Error screen -->
    <div id="error-screen" class="hidden">
        <h1>오류</h1>
        <p id="error-message"></p>
        <a href="/" id="error-home-btn">홈으로</a>
    </div>

    <!-- Start screen -->
    <div id="start-screen">
        <div class="start-glow"></div>
        <div class="start-content">
            <div class="start-icon">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                    <circle cx="12" cy="13" r="4"/>
                </svg>
            </div>
            <p id="ar-title-display" class="hidden"></p>
            <h1>포토존</h1>
            <p class="start-desc">카메라로 나만의 포토존을 체험해보세요</p>
            <button id="start-btn">시작하기</button>
            <button id="xr-start-btn" class="hidden">AR 배치 모드</button>
            <p id="permission-status"></p>
        </div>
    </div>

    <!-- Loading screen -->
    <div id="loading-screen" class="hidden">
        <div class="loading-inner">
            <div id="loading-spinner"></div>
            <div id="loading-text">초기화 중...</div>
            <div id="loading-bar-wrap">
                <div id="loading-bar"></div>
            </div>
        </div>
    </div>

    <!-- AR Layers -->
    <div id="ar-container" class="hidden">
        <!-- Layer 1: Camera background -->
        <video id="video-background" playsinline autoplay muted></video>

        <!-- Layer 2: Three.js canvas (appended by JS) -->
        <div id="canvas-container"></div>

        <!-- 파일 전환 버튼 (다중 파일일 때만 표시) -->
        <div id="file-switch-btns" class="hidden"></div>

        <!-- Touch area for gestures -->
        <div id="touch-area"></div>

        <!-- 워터마크 -->
        <img id="watermark" src="/컬러_컬러_ver.png" alt="" draggable="false">

        <!-- Instruction overlay -->
        <div id="instruction">드래그: 이동 &middot; 핀치: 크기 &middot; ↻: 3D 회전 &middot; ○: 사진 &middot; ●: 녹화</div>

        <!-- 영상 재생/정지 버튼 (비디오 파일일 때만 표시) -->
        <button id="play-btn" class="hidden">
            <svg id="play-icon-pause" width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
            <svg id="play-icon-play"  width="13" height="13" viewBox="0 0 24 24" fill="currentColor" style="display:none"><polygon points="5,3 19,12 5,21"/></svg>
        </button>

        <!-- 카메라 전환 버튼 -->
        <button id="flip-btn">↻</button>

        <!-- 캡처 버튼 (셔터) -->
        <button id="capture-btn"></button>

        <!-- 녹화 버튼 -->
        <button id="record-btn"></button>

        <!-- 회전 조정 토글 버튼 -->
        <button id="rotate-toggle-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21.5 2v6h-6"/>
                <path d="M21.34 15.57a10 10 0 1 1-.57-8.38"/>
            </svg>
        </button>

        <!-- Color adjustment toggle -->
        <button id="adjust-toggle-btn">색상 조정</button>

        <!-- Color adjustment panel -->
        <div id="color-adjust-panel" class="hidden">
            <div id="panel-header">
                <span>크로마키 조정</span>
                <button id="panel-close-btn">X</button>
            </div>
            <div class="panel-row">
                <label>색상</label>
                <input type="color" id="adjust-color" value="#00ff00">
            </div>
            <div class="panel-row">
                <label>허용범위 <span id="adj-sim-val">0.40</span></label>
                <input type="range" id="adjust-similarity" min="0.1" max="0.8" step="0.05" value="0.4">
            </div>
            <div class="panel-row">
                <label>부드러움 <span id="adj-smooth-val">0.10</span></label>
                <input type="range" id="adjust-smoothness" min="0.0" max="0.3" step="0.02" value="0.1">
            </div>
        </div>

        <!-- 3D 회전 패널 -->
        <div id="rotate-panel" class="hidden">
            <div id="rotate-panel-header">
                <span>3D 회전</span>
                <button id="rotate-reset-btn">초기화</button>
                <button id="rotate-panel-close">X</button>
            </div>
            <div class="panel-row">
                <label>X축 <span id="rot-x-val">0°</span></label>
                <input type="range" id="rot-x" min="-180" max="180" step="1" value="0">
            </div>
            <div class="panel-row">
                <label>Y축 <span id="rot-y-val">0°</span></label>
                <input type="range" id="rot-y" min="-180" max="180" step="1" value="0">
            </div>
            <div class="panel-row">
                <label>Z축 <span id="rot-z-val">0°</span></label>
                <input type="range" id="rot-z" min="-180" max="180" step="1" value="0">
            </div>
            <div class="panel-divider"></div>
            <div class="panel-row">
                <label>투명도 <span id="opacity-val">100%</span></label>
                <input type="range" id="opacity-range" min="0" max="100" step="1" value="100">
            </div>
        </div>
    </div>

    <!-- WebXR 오버레이 (dom-overlay) -->
    <div id="xr-overlay" class="hidden">
        <div id="xr-place-msg">바닥이나 책상을 비추세요<br><small>표면 감지 후 탭하여 배치</small></div>
        <button id="xr-exit-btn">종료</button>
        <div id="xr-controls" class="hidden">
            <div class="panel-row">
                <label>크기 <span id="xr-scale-val">30cm</span></label>
                <input type="range" id="xr-scale" min="10" max="200" step="5" value="30">
            </div>
            <div class="panel-row">
                <label>투명도 <span id="xr-opacity-val">100%</span></label>
                <input type="range" id="xr-opacity" min="0" max="100" step="1" value="100">
            </div>
        </div>
    </div>

    <!-- 녹화 완료 저장 오버레이 -->
    <div id="save-overlay" class="hidden">
        <div id="save-box">
            <p id="save-msg">녹화 완료!</p>
            <div id="convert-progress" class="hidden">
                <div id="convert-bar-wrap"><div id="convert-bar"></div></div>
                <span id="convert-text">MP4 변환 중...</span>
            </div>
            <a id="save-link" href="#" class="hidden">영상 저장하기</a>
            <button id="share-btn" class="hidden">공유하기</button>
            <button id="save-close-btn">닫기</button>
        </div>
    </div>

    <script src="/js/ar-viewer.js"></script>
</body>
</html>
